<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shlesha Day</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Poppins;
color:white;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 20%, #1a1a40, transparent),
radial-gradient(circle at 80% 30%, #2d1b69, transparent),
#0f0f1a;
}


/* TITLE */

h1{
font-family:"Playfair Display";
font-size:70px;
margin-bottom:10px;
letter-spacing:2px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}


/* COUNTDOWN */

.countdown{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.time-box{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
min-width:120px;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

.time-box h2{
font-size:45px;
margin:0;
}

.time-box p{
margin:5px 0 0 0;
opacity:0.8;
}


/* FOOTER TEXT */

.footer{
margin-top:40px;
opacity:0.7;
}


/* STARS */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
z-index:-1;
animation:stars 120s linear infinite;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}


/* FLOATING HEARTS */

.hearts::before,
.hearts::after{
content:"💖 💗 💕 💞 💓 💘";
position:fixed;
width:100%;
top:100%;
font-size:22px;
animation:floatHearts 20s linear infinite;
opacity:0.6;
}

.hearts::after{
animation-delay:10s;
}

@keyframes floatHearts{

0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}

}


/* MOBILE */

@media(max-width:600px){

h1{
font-size:45px;
}

.countdown{
gap:20px;
}

.time-box{
min-width:90px;
padding:20px;
}

.time-box h2{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="hearts"></div>

<h1>Shlesha Day 🎂</h1>

<p class="subtitle">
Counting down to the birth of my fav person>>
</p>

<div class="countdown">

<div class="time-box">
<h2 id="days">0</h2>
<p>Days</p>
</div>

<div class="time-box">
<h2 id="hours">0</h2>
<p>Hours</p>
</div>

<div class="time-box">
<h2 id="minutes">0</h2>
<p>Minutes</p>
</div>

<div class="time-box">
<h2 id="seconds">0</h2>
<p>Seconds</p>
</div>

</div>

<p class="footer">
April 1 
</p>


<script>

const birthday = new Date("April 1, 2026 00:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();

const distance = birthday - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
const seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

</script>

</body>
</html>
