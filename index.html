<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shlesha Day</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Poppins;
color:white;
text-align:center;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;

background:
radial-gradient(circle at 20% 20%, #1a1a40, transparent),
radial-gradient(circle at 80% 30%, #2d1b69, transparent),
#0f0f1a;
}


/* TITLE */

h1{
font-family:"Playfair Display";
font-size:64px;
margin-bottom:10px;
letter-spacing:2px;
}

.subtitle{
opacity:0.8;
margin-bottom:10px;
font-size:18px;
}

/* TAP MESSAGE */

.tap{
opacity:0.6;
font-size:14px;
margin-bottom:30px;
}

/* COUNTDOWN */

.countdown{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:40px;
}

.time-box{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
min-width:110px;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

animation:heartbeat 2s infinite;

}

.time-box h2{
font-size:42px;
margin:0;
}

.time-box p{
margin:5px 0 0 0;
opacity:0.8;
}

@keyframes heartbeat{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}


/* DAILY MESSAGE SECTION */

.daily-message{
max-width:500px;
margin-top:20px;
margin-bottom:30px;
}

.daily-message h2{
font-size:24px;
margin-bottom:10px;
}

.quote{
font-style:italic;
font-size:16px;
opacity:0.9;
margin-bottom:8px;
}

.song{
font-size:14px;
opacity:0.6;
}

/* BIRTHDAY MESSAGE */

.birthday{
display:none;
font-size:36px;
margin-top:30px;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}


/* FOOTER TEXT */

.footer{
margin-top:30px;
opacity:0.7;
font-size:14px;
}


/* STARS */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
z-index:-1;
animation:stars 120s linear infinite;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}


/* FLOATING HEARTS */

.hearts::before,
.hearts::after{
content:"💖 💗 💕 💞 💓 💘";
position:fixed;
width:100%;
top:100%;
font-size:22px;
animation:floatHearts 20s linear infinite;
opacity:0.6;
}

.hearts::after{
animation-delay:10s;
}

@keyframes floatHearts{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}


/* RESPONSIVE DESIGN */

@media(max-width:768px){

h1{
font-size:48px;
}

.subtitle{
font-size:16px;
}

.countdown{
gap:18px;
}

.time-box{
min-width:80px;
padding:18px;
}

.time-box h2{
font-size:28px;
}

.daily-message h2{
font-size:20px;
}

}

</style>

</head>

<body>

<audio id="bgmusic" autoplay loop muted playsinline preload="auto">
<source src="Jhol.mp3" type="audio/mpeg">
</audio>

<div class="hearts"></div>

<h1>Shlesha Day 🎂</h1>

<p class="subtitle">
Counting down to the birth of my fav person >>
</p>

<p class="tap">
Tap anywhere to start the universe ✨
</p>

<div class="countdown">

<div class="time-box">
<h2 id="days">0</h2>
<p>Days</p>
</div>

<div class="time-box">
<h2 id="hours">0</h2>
<p>Hours</p>
</div>

<div class="time-box">
<h2 id="minutes">0</h2>
<p>Minutes</p>
</div>

<div class="time-box">
<h2 id="seconds">0</h2>
<p>Seconds</p>
</div>

</div>


<!-- MESSAGES FOR MY UNIVERSE -->

<div class="daily-message">

<h2>A Little Note For My Universe ✨</h2>

<p id="dailyQuote" class="quote"></p>

<p id="dailySong" class="song"></p>

</div>


<div class="birthday" id="birthdayMessage">
Happy Birthday Shlesha 💖
</div>

<p class="footer">
April 1
</p>


<script>

/* COUNTDOWN */

const birthday = new Date("April 1, 2026 00:00:00").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = birthday - now;

if(distance < 0){

clearInterval(timer);

document.querySelector(".countdown").style.display="none";
document.getElementById("birthdayMessage").style.display="block";

return;

}

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);


/* MUSIC START */

const music = document.getElementById("bgmusic");

music.volume = 0.25;

function enableSound(){

music.muted = false;
music.play().catch(()=>{});

document.removeEventListener("click", enableSound);
document.removeEventListener("touchstart", enableSound);

}

document.addEventListener("click", enableSound);
document.addEventListener("touchstart", enableSound);


/* DAILY MESSAGE SYSTEM */

const messages = [

{
quote:"I know I hurt you today, and I hate that I was the reason you felt that way. I’m really sorry… you didn’t deserve that from me. Even if things feel a little off right now, you still matter to me more than anything else.",
song:"Today's Signal From the Universe: Jhol"
},

{
quote:"I know I hurt you today, and I hate that I was the reason you felt that way. I’m really sorry… you didn’t deserve that from me. Even if things feel a little off right now, you still matter to me more than anything else.",
song:"Today's Signal From the Universe: Jhol"
},

{
quote:"Some people quietly enter your life and change your entire universe.",
song:"Today's Song: Yellow – Coldplay"
},

{
quote:"I know I hurt you today, and I hate that I was the reason you felt that way. I’m really sorry… you didn’t deserve that from me. Even if things feel a little off right now, you still matter to me more than anything else.",
song:"Today's Signal From the Universe: Jhol"
},

{
quote:"Some memories feel like home, no matter how much time passes.",
song:"Today's Song: Raanjhanaa – A.R. Rahman"
}

];

const today = new Date().getDate();
const messageIndex = today % messages.length;

document.getElementById("dailyQuote").innerText =
messages[messageIndex].quote;

document.getElementById("dailySong").innerText =
messages[messageIndex].song;

</script>

</body>
</html>
